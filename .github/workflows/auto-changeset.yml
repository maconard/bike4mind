name: Auto Changeset

# Auto-generate .changeset/pr-{N}.md from conventional commit PR titles.
# Replaces the manual `pnpm changeset` step that developers used to forget.
# Packages are auto-discovered from workspace package.json files — no hardcoded list.

on:
  pull_request:
    types: [opened, synchronize, edited]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: changeset-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  HUSKY: '0'

jobs:
  auto-changeset:
    # Skip: forks, dependabot, Version Packages PR, non-repo
    if: >-
      github.repository == (vars.CANONICAL_REPO || 'MillionOnMars/lumina5') &&
      github.actor != 'dependabot[bot]' &&
      !startsWith(github.head_ref, 'changeset-release/') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    steps:
      - name: Skip body-only edits
        if: github.event.action == 'edited' && !github.event.changes.title
        run: echo "SKIP=true" >> "$GITHUB_ENV"

      - name: Generate App token
        if: env.SKIP != 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        if: env.SKIP != 'true'
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Fetch base branch
        if: env.SKIP != 'true'
        run: git fetch origin main

      - name: Configure Git
        if: env.SKIP != 'true'
        run: |
          git config user.name "b4m-release-bot[bot]"
          git config user.email "b4m-release-bot[bot]@users.noreply.github.com"

      - name: Skip if last commit is from bot
        if: env.SKIP != 'true'
        run: |
          LAST_AUTHOR=$(git log -1 --format='%an')
          if [ "$LAST_AUTHOR" = "b4m-release-bot[bot]" ]; then
            echo "::notice::Last commit is from bot. Skipping to prevent loop."
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Generate changeset
        if: env.SKIP != 'true'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          CHANGESET_FILE=".changeset/pr-${PR_NUMBER}.md"
          AUTO_MARKER="<!-- auto-generated by auto-changeset workflow -->"

          echo "PR Title: $PR_TITLE"
          echo "PR Number: $PR_NUMBER"

          # ── 1. Parse conventional commit from PR title ──
          # Pattern: type(scope): description  OR  type(scope)!: description
          if [[ ! "$PR_TITLE" =~ ^([a-z]+)(\(([a-zA-Z0-9,/_-]+)\))?(!)?\:\ (.+)$ ]]; then
            echo "::warning::PR title does not match conventional commit format (type(scope): description)."

            # Remove stale auto-changeset if present
            if [ -f "$CHANGESET_FILE" ] && grep -q "$AUTO_MARKER" "$CHANGESET_FILE" 2>/dev/null; then
              git rm "$CHANGESET_FILE"
              git commit -m "chore: remove auto-changeset for PR #${PR_NUMBER} (non-conventional title)"
              git push
            fi

            # Post PR comment with guidance
            COMMENT_MARKER="<!-- auto-changeset-comment -->"
            COMMENT_BODY="${COMMENT_MARKER}
          **Auto-Changeset:** PR title does not follow conventional commit format (\`type(scope): description\`).

          No changeset was auto-generated. If this PR changes published packages, either:
          - Update the PR title (e.g., \`feat(common): add new feature\`)
          - Or run \`pnpm changeset\` manually

          Valid types: \`feat\` (minor), \`fix\`/\`perf\` (patch), \`refactor\` (patch), or append \`!\` for major."

            # Upsert comment (find existing by marker, update or create)
            EXISTING_COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq ".[] | select(.body | contains(\"${COMMENT_MARKER}\")) | .id" | head -1)

            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" \
                -X PATCH -f body="$COMMENT_BODY" > /dev/null
            else
              gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
                -f body="$COMMENT_BODY" > /dev/null
            fi

            exit 0
          fi

          TYPE="${BASH_REMATCH[1]}"
          SCOPE="${BASH_REMATCH[3]:-}"
          BREAKING="${BASH_REMATCH[4]:-}"
          DESCRIPTION="${BASH_REMATCH[5]}"

          echo "Type: $TYPE | Scope: $SCOPE | Breaking: $BREAKING"

          # ── 2. Determine bump level ──
          if [ -n "$BREAKING" ]; then
            BUMP="major"
          elif [ "$TYPE" = "feat" ]; then
            BUMP="minor"
          elif [ "$TYPE" = "fix" ] || [ "$TYPE" = "perf" ] || [ "$TYPE" = "refactor" ]; then
            BUMP="patch"
          else
            echo "::notice::Type '$TYPE' does not require a changeset. Skipping."

            # Remove stale auto-changeset if title changed from publishable to non-publishable
            if [ -f "$CHANGESET_FILE" ] && grep -q "$AUTO_MARKER" "$CHANGESET_FILE" 2>/dev/null; then
              git rm "$CHANGESET_FILE"
              git commit -m "chore: remove auto-changeset for PR #${PR_NUMBER} (type: $TYPE)"
              git push
            fi

            # Delete the guidance comment if it exists (title is now valid, just non-publishable)
            COMMENT_MARKER="<!-- auto-changeset-comment -->"
            EXISTING_COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq ".[] | select(.body | contains(\"${COMMENT_MARKER}\")) | .id" | head -1)
            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" -X DELETE > /dev/null 2>&1 || true
            fi

            exit 0
          fi

          echo "Bump level: $BUMP"

          # ── 3. Auto-discover publishable packages ──
          # A package is publishable if it has publishConfig, is NOT private, and
          # is NOT in .changeset/config.json ignore list.
          declare -A PUBLISHABLE_MAP=()  # dir -> package name
          declare -A SCOPE_MAP=()        # short name -> package name

          IGNORE_LIST=$(cat .changeset/config.json | python3 -c "
          import sys, json
          cfg = json.load(sys.stdin)
          for pkg in cfg.get('ignore', []):
              print(pkg)
          " 2>/dev/null || echo "")

          for pkg_json in b4m-core/*/package.json apps/*/package.json packages/*/package.json; do
            [ -f "$pkg_json" ] || continue
            dir=$(dirname "$pkg_json")
            # Use sys.argv to avoid shell interpolation in Python string
            name=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1])).get('name',''))" "$pkg_json")
            has_publish=$(python3 -c "import json,sys; print('publishConfig' in json.load(open(sys.argv[1])))" "$pkg_json")
            is_private=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1])).get('private', False))" "$pkg_json")

            if [ "$has_publish" = "True" ] && [ "$is_private" != "True" ]; then
              # Check ignore list
              if ! echo "$IGNORE_LIST" | grep -qx "$name"; then
                PUBLISHABLE_MAP["$dir"]="$name"
                # Extract short name: @bike4mind/common -> common
                short=$(echo "$name" | sed 's|.*/||')
                SCOPE_MAP["$short"]="$name"
                echo "  Publishable: $dir -> $name"
              fi
            fi
          done

          if [ ${#PUBLISHABLE_MAP[@]} -eq 0 ]; then
            echo "::warning::No publishable packages found in workspace."
            exit 0
          fi

          # ── 4. Detect changed packages from git diff (merge-base) ──
          MERGE_BASE=$(git merge-base HEAD origin/main)
          CHANGED_FILES=$(git diff --name-only "$MERGE_BASE" HEAD)

          declare -A CHANGED_PKGS=()
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            for dir in "${!PUBLISHABLE_MAP[@]}"; do
              if [[ "$file" == "$dir/"* ]]; then
                CHANGED_PKGS["${PUBLISHABLE_MAP[$dir]}"]=1
                break
              fi
            done
          done <<< "$CHANGED_FILES"

          # ── 5. Include packages from PR title scope ──
          if [ -n "$SCOPE" ]; then
            IFS=',' read -ra SCOPES <<< "$SCOPE"
            for s in "${SCOPES[@]}"; do
              s=$(echo "$s" | tr -d ' ')
              if [ -n "${SCOPE_MAP[$s]:-}" ]; then
                CHANGED_PKGS["${SCOPE_MAP[$s]}"]=1
              fi
            done
          fi

          if [ ${#CHANGED_PKGS[@]} -eq 0 ]; then
            echo "::notice::No publishable packages changed. Skipping changeset."

            # Clean up stale auto-changeset
            if [ -f "$CHANGESET_FILE" ] && grep -q "$AUTO_MARKER" "$CHANGESET_FILE" 2>/dev/null; then
              git rm "$CHANGESET_FILE"
              git commit -m "chore: remove auto-changeset for PR #${PR_NUMBER} (no publishable changes)"
              git push
            fi
            exit 0
          fi

          # ── 6. Check for existing manual changesets (additive mode) ──
          # If a manual changeset already covers a package, skip auto-generating for it.
          declare -A MANUAL_COVERED=()

          for cs_file in .changeset/*.md; do
            [ -f "$cs_file" ] || continue
            filename=$(basename "$cs_file")

            # Skip README and auto-generated files
            [ "$filename" = "README.md" ] && continue
            [[ "$filename" == pr-*.md ]] && continue

            # Parse packages from the changeset frontmatter
            in_frontmatter=false
            while IFS= read -r line; do
              if [ "$line" = "---" ]; then
                if [ "$in_frontmatter" = true ]; then
                  break
                else
                  in_frontmatter=true
                  continue
                fi
              fi
              if [ "$in_frontmatter" = true ]; then
                # Extract package name: "@bike4mind/common": minor  OR  @bike4mind/common: minor
                pkg=$(echo "$line" | sed -n 's/^"\{0,1\}\(@[^"]*\)"\{0,1\}:.*/\1/p')
                if [ -n "$pkg" ]; then
                  MANUAL_COVERED["$pkg"]=1
                fi
              fi
            done < "$cs_file"
          done

          # Remove packages already covered by manual changesets
          for pkg in "${!MANUAL_COVERED[@]}"; do
            if [ -n "${CHANGED_PKGS[$pkg]:-}" ]; then
              echo "  Package $pkg already covered by manual changeset. Skipping."
              unset "CHANGED_PKGS[$pkg]"
            fi
          done

          if [ ${#CHANGED_PKGS[@]} -eq 0 ]; then
            echo "::notice::All changed packages covered by manual changesets. Skipping auto-generation."
            exit 0
          fi

          echo "Packages to bump: ${!CHANGED_PKGS[*]}"

          # ── 7. Generate changeset file ──
          {
            echo "$AUTO_MARKER"
            echo "---"
            for pkg in $(echo "${!CHANGED_PKGS[*]}" | tr ' ' '\n' | sort); do
              echo "\"$pkg\": $BUMP"
            done
            echo "---"
            echo ""
            echo "$DESCRIPTION"
          } > "$CHANGESET_FILE"

          echo "Generated changeset:"
          cat "$CHANGESET_FILE"

          # ── 8. Check if content actually changed ──
          git add "$CHANGESET_FILE"
          if git diff --cached --quiet; then
            echo "::notice::Changeset already up-to-date. No commit needed."
            exit 0
          fi

          # ── 9. Commit and push ──
          git commit -m "chore: auto-generate changeset for PR #${PR_NUMBER}"
          git push

          # ── 10. Clean up guidance comment if it exists ──
          COMMENT_MARKER="<!-- auto-changeset-comment -->"
          EXISTING_COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${COMMENT_MARKER}\")) | .id" | head -1)
          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" -X DELETE > /dev/null 2>&1 || true
          fi

          echo "::notice::Changeset committed for PR #${PR_NUMBER}"
