name: Deploy Environment

# Reusable deploy workflow. Reads non-secret config from .github/tenants.yml,
# secrets from the bound GitHub Environment. Caller passes tenant + tier +
# pr_number + the core build content hash (so this workflow can restore the
# core-build-<hash> artifact the `test` job produced).

on:
  workflow_call:
    inputs:
      tenant:
        description: 'Tenant name (key in tenants.yml)'
        required: true
        type: string
      tier:
        description: 'Deployment tier: dev, production, or preview'
        required: true
        type: string
      pr_number:
        description: 'PR number (for preview deployments)'
        required: false
        type: string
        default: ''
      core_content_hash:
        description: 'Content hash of the core-build artifact uploaded by the test job'
        required: false
        type: string
        default: ''
      is_trusted_context:
        description: >
          'true' for same-repo pushes and PRs that have access to secrets; 'false' for
          fork PRs (which have no secret access and cannot deploy anyway). Controls whether
          the premium overlay is cloned from the private premium repos (b4m-overwatch,
          b4m-libreoncology, b4m-optihashi, b4m-pi, b4m-tavern).
        required: false
        type: string
        default: 'true'
    outputs:
      preview-url:
        description: 'Server domain of the deployed environment'
        value: ${{ jobs.deploy.outputs.preview-url }}
      is-preview:
        description: 'Whether this was a preview (pr<N>) deploy'
        value: ${{ jobs.deploy.outputs.is-preview }}
      stage:
        description: 'SST stage that was deployed'
        value: ${{ jobs.deploy.outputs.stage }}
      core-content-hash:
        description: 'Pass-through of the core build content hash (for downstream e2e)'
        value: ${{ jobs.deploy.outputs.core-content-hash }}

env:
  AWS_REGION: us-east-2
  NODE_VERSION: '24'

jobs:
  deploy:
    # Self-hosted org pool (philips-labs/terraform-aws-github-runner, m6a/m6i.2xlarge,
    # 8 vCPU / 32 GB) instead of the GitHub-hosted ubuntu-latest-m larger-runner pool,
    # which is capped at 10 concurrent org-wide. 32 GB comfortably covers the deploy
    # step's 12 GB Node heap (NODE_OPTIONS below). Matches polaris's deploy runner.
    runs-on: ${{ vars.RUNNER_LABEL_HEAVY || 'ubuntu-latest-m' }}
    name: Deploy
    # 45 (was 30): must hold pre-steps (hydrate/install/build/image) + the 30-min
    # deploy step below + the unlock cleanup path. 2026-07-05: drift-heavy heals
    # blew the old caps twice.
    timeout-minutes: 45
    # tier names map 1:1 to the bike4mind GitHub Environment names
    # (dev / preview / production). Secrets (AWS_ROLE_ARN, etc.) resolve from here.
    environment:
      name: ${{ inputs.tier }}
    concurrency:
      group: deploy-${{ inputs.tenant }}-${{ inputs.tier == 'preview' && format('pr{0}', inputs.pr_number) || inputs.tier }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
      issues: write
      actions: read
      packages: read
      pull-requests: write
      deployments: write
    outputs:
      preview-url: ${{ steps.cfg.outputs.server_domain }}
      is-preview: ${{ steps.cfg.outputs.is_preview }}
      stage: ${{ steps.cfg.outputs.stage }}
      core-content-hash: ${{ inputs.core_content_hash }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Premium overlay: clone private overlay repos into packages/premium/ ──
      # Only runs in trusted contexts (same-repo PRs + pushes). Fork PRs skip this
      # entirely — they have no secrets and can't deploy anyway (AWS_ROLE_ARN empty).
      # The ref to clone for each repo is read from premium-overlay.lock.json
      # (committed at repo root). During a lumina5 PR that touches a premium feature,
      # point that repo's lock entry at a branch for preview testing; bump it back to
      # a SHA before merging. The SHA guard step below enforces this on main/prod.
      #
      # One token is minted via the b4m-premium-overlay GitHub App (client id in repo
      # variable PREMIUM_OVERLAY_CLIENT_ID; private key in secret
      # PREMIUM_OVERLAY_APP_PRIVATE_KEY), scoped to the private overlay repos
      # (b4m-overwatch, b4m-libreoncology, b4m-pi, b4m-tavern) contents:read.
      #
      # Use actions/checkout (NOT hand-rolled `git clone`): on the self-hosted runner
      # the primary checkout persists the GITHUB_TOKEN as an
      # `http.https://github.com/.extraheader`. That lumina5-scoped header overrides
      # inline x-access-token URL creds on a `git clone`, causing a 404 on the
      # private overlay repo even with a valid token. actions/checkout scopes creds
      # to each repo's own gitdir via includeIf — no collision. Reuse this pattern
      # for every future premium repo (add it to the app's selected repos first).

      # Emits a `<repo>-ref` output per key in the lock file, so a future overlay is
      # covered without editing this step (mirrors the all-keys guard below).
      - name: Read premium overlay pins
        id: overlay-pin
        if: inputs.is_trusted_context == 'true'
        run: |
          python3 - <<'PY'
          import json, os, re, sys
          try:
              pins = json.load(open('premium-overlay.lock.json'))
          except Exception as e:
              print(f"::error::Could not read premium-overlay.lock.json: {e}")
              sys.exit(1)
          # Validate the ref shape before writing to GITHUB_OUTPUT: a value with an
          # embedded newline would inject extra output lines, and a malformed pin
          # should fail here (in preview too) rather than at the checkout step.
          # Accept a 40-char SHA or a branch/tag starting alphanumeric; reject a
          # leading '-' (option injection) and '..' (path traversal).
          ok = re.compile(r'^([0-9a-f]{40}|[A-Za-z0-9_][A-Za-z0-9._/-]*)$')
          lines = []
          for repo, ref in pins.items():
              ref = str(ref)
              if not ok.match(ref) or '..' in ref:
                  print(f"::error::premium-overlay.lock.json '{repo}' ref is malformed: {ref}")
                  sys.exit(1)
              lines.append(f"{repo}-ref={ref}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write("\n".join(lines) + "\n")
          for line in lines:
              print(line)
          PY

      # Post-merge backstop: every overlay pin must be a 40-char SHA on main/prod
      # (the merge-queue gate in deploy.yml is the pre-merge counterpart). Iterates
      # ALL keys in the lock file, so a future overlay is covered without editing
      # this step.
      - name: Verify premium overlay pins are SHAs (main/prod guard)
        if: |
          inputs.is_trusted_context == 'true' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/prod')
        run: |
          python3 - <<'PY'
          import json, re, sys
          try:
              pins = json.load(open('premium-overlay.lock.json'))
          except Exception as e:
              print(f"::error::Could not read premium-overlay.lock.json: {e}")
              sys.exit(1)
          bad = {k: v for k, v in pins.items() if not re.fullmatch(r'[0-9a-f]{40}', str(v))}
          for k, v in bad.items():
              print(f"::error::premium-overlay.lock.json '{k}' must pin a 40-char SHA on main/prod (got: {v}). Bump it to the merged commit SHA before merging.")
          if bad:
              sys.exit(1)
          for k, v in pins.items():
              print(f"Pin verified: {k}={v}")
          PY

      - name: Generate premium overlay token
        id: premium-token
        if: inputs.is_trusted_context == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PREMIUM_OVERLAY_CLIENT_ID }}
          private-key: ${{ secrets.PREMIUM_OVERLAY_APP_PRIVATE_KEY }}
          # Owner of the premium overlay repos + the overlay GitHub App installation.
          # Configurable so the open-core cutover (repos + app move MillionOnMars ->
          # Bike4Mind) is an instant `PREMIUM_OVERLAY_OWNER` var flip, not a code change.
          # Unset var falls back to MillionOnMars, so this is a no-op until the var is set.
          owner: ${{ vars.PREMIUM_OVERLAY_OWNER || 'MillionOnMars' }}
          repositories: |
            b4m-overwatch
            b4m-libreoncology
            b4m-optihashi
            b4m-pi
            b4m-tavern

      # packages/premium/overwatch/ is no longer committed in lumina5 (removed so the
      # repo can be open-sourced). The rm is a safety net only — it is a no-op on a
      # clean checkout but ensures any accidentally re-added snapshot is cleared before
      # the pinned ref is hydrated.
      - name: Clear in-repo premium overlay
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        run: rm -rf packages/premium/overwatch

      # persist-credentials:false leaves no overlay token in the gitdir post-job.
      - name: Hydrate premium overlay
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        uses: actions/checkout@v6
        with:
          repository: MillionOnMars/b4m-overwatch
          token: ${{ steps.premium-token.outputs.token }}
          ref: ${{ steps.overlay-pin.outputs.b4m-overwatch-ref }}
          path: packages/premium/overwatch
          fetch-depth: 1
          persist-credentials: false

      # Wire overwatch back into apps/client/package.json as a workspace:* dep now that
      # the directory exists. This is required for pnpm to symlink it into node_modules
      # so generated glue stubs (bare specifiers like @bike4mind/premium-overwatch/spa-routes)
      # resolve at typecheck/bundle time. Only runs when hydration succeeded.
      - name: Wire overwatch into workspace deps
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/client/package.json', 'utf8'));
            pkg.dependencies['@bike4mind/premium-overwatch'] = 'workspace:*';
            fs.writeFileSync('apps/client/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # packages/premium/libreoncology/ is no longer committed in lumina5 (removed so the
      # repo can be open-sourced). The rm is a safety net only — it is a no-op on a
      # clean checkout but ensures any accidentally re-added snapshot is cleared before
      # the pinned ref is hydrated.
      - name: Clear in-repo premium overlay (libreoncology)
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        run: rm -rf packages/premium/libreoncology

      # persist-credentials:false leaves no overlay token in the gitdir post-job.
      - name: Hydrate premium overlay (libreoncology)
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        uses: actions/checkout@v6
        with:
          repository: MillionOnMars/b4m-libreoncology
          token: ${{ steps.premium-token.outputs.token }}
          ref: ${{ steps.overlay-pin.outputs.b4m-libreoncology-ref }}
          path: packages/premium/libreoncology
          fetch-depth: 1
          persist-credentials: false

      # Wire libreoncology back into apps/client/package.json as a workspace:* dep now that
      # the directory exists. This is required for pnpm to symlink it into node_modules
      # so generated glue stubs (bare specifiers like @bike4mind/premium-libreoncology/spa-routes)
      # resolve at typecheck/bundle time. Only runs when hydration succeeded.
      - name: Wire libreoncology into workspace deps
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/client/package.json', 'utf8'));
            pkg.dependencies['@bike4mind/premium-libreoncology'] = 'workspace:*';
            fs.writeFileSync('apps/client/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # packages/premium/pi/ is no longer committed in lumina5 (removed so the
      # repo can be open-sourced). The rm is a safety net only — it is a no-op on a
      # clean checkout but ensures any accidentally re-added snapshot is cleared before
      # the pinned ref is hydrated.
      - name: Clear in-repo premium overlay (pi)
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        run: rm -rf packages/premium/pi

      # persist-credentials:false leaves no overlay token in the gitdir post-job.
      - name: Hydrate premium overlay (pi)
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        uses: actions/checkout@v6
        with:
          repository: MillionOnMars/b4m-pi
          token: ${{ steps.premium-token.outputs.token }}
          ref: ${{ steps.overlay-pin.outputs.b4m-pi-ref }}
          path: packages/premium/pi
          fetch-depth: 1
          persist-credentials: false

      # Wire pi back into apps/client/package.json as a workspace:* dep now that
      # the directory exists. This is required for pnpm to symlink it into node_modules
      # so generated glue stubs (bare specifiers like @bike4mind/premium-pi/spa-routes)
      # resolve at typecheck/bundle time. Only runs when hydration succeeded.
      - name: Wire pi into workspace deps
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/client/package.json', 'utf8'));
            pkg.dependencies['@bike4mind/premium-pi'] = 'workspace:*';
            fs.writeFileSync('apps/client/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # packages/premium/tavern/ is no longer committed in lumina5 (removed in Phase 2 so
      # the repo can be open-sourced). The rm is a safety net only — it is a no-op on a
      # clean checkout but ensures any accidentally re-added snapshot is cleared before
      # the pinned ref is hydrated.
      - name: Clear in-repo premium overlay (tavern)
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        run: rm -rf packages/premium/tavern

      # persist-credentials:false leaves no overlay token in the gitdir post-job.
      - name: Hydrate premium overlay (tavern)
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        uses: actions/checkout@v6
        with:
          repository: MillionOnMars/b4m-tavern
          token: ${{ steps.premium-token.outputs.token }}
          ref: ${{ steps.overlay-pin.outputs.b4m-tavern-ref }}
          path: packages/premium/tavern
          fetch-depth: 1
          persist-credentials: false

      # Wire tavern back into apps/client/package.json as a workspace:* dep now that the
      # directory exists. Required for pnpm to symlink it into node_modules so generated
      # glue stubs (bare specifiers like @bike4mind/premium-tavern/spa-routes) resolve at
      # typecheck/bundle time. Only runs when hydration succeeded.
      - name: Wire tavern into workspace deps
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/client/package.json', 'utf8'));
            pkg.dependencies['@bike4mind/premium-tavern'] = 'workspace:*';
            fs.writeFileSync('apps/client/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # packages/premium/optihashi/ is still committed in lumina5 at this phase (Phase A).
      # The rm clears the committed snapshot so the pinned ref below is the authoritative
      # source. Becomes a no-op once Phase C (M-final) removes the snapshot from lumina5.
      - name: Clear in-repo premium overlay (optihashi)
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        run: rm -rf packages/premium/optihashi

      # persist-credentials:false leaves no overlay token in the gitdir post-job.
      - name: Hydrate premium overlay (optihashi)
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        uses: actions/checkout@v6
        with:
          repository: MillionOnMars/b4m-optihashi
          token: ${{ steps.premium-token.outputs.token }}
          ref: ${{ steps.overlay-pin.outputs.b4m-optihashi-ref }}
          path: packages/premium/optihashi
          fetch-depth: 1
          persist-credentials: false

      # Wire optihashi back into apps/client/package.json as a workspace:* dep now that
      # the directory exists (it is already present, but this is idempotent and ensures
      # the dep survives if it is ever accidentally removed).
      - name: Wire optihashi into workspace deps
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/client/package.json', 'utf8'));
            pkg.dependencies['@bike4mind/premium-optihashi'] = 'workspace:*';
            fs.writeFileSync('apps/client/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      # ── end premium overlay ──

      - name: Load tenant config
        id: cfg
        env:
          TENANT: ${{ inputs.tenant }}
          TIER: ${{ inputs.tier }}
          PR_NUMBER: ${{ inputs.pr_number }}
          # Tenancy for repos without .github/tenants.yml (the open-core snapshot
          # excludes it, #507): same DEPLOY_TENANTS var the plan job reads — a JSON
          # object of tenant-name -> config in tenants.yml's `tenants:` shape,
          # INCLUDING the per-tenant `environments` blocks this step resolves
          # (all non-secret by design; secrets stay in GitHub Environments). #9853.
          DEPLOY_TENANTS: ${{ vars.DEPLOY_TENANTS }}
        run: |
          python3 - <<'PYEOF'
          import yaml, json, os

          if os.path.exists('.github/tenants.yml'):
              with open('.github/tenants.yml') as f:
                  config = yaml.safe_load(f)
          else:
              raw = os.environ.get('DEPLOY_TENANTS', '').strip()
              if not raw:
                  print("::error::No .github/tenants.yml and no DEPLOY_TENANTS var - cannot resolve tenant config.")
                  raise SystemExit(1)
              config = {'tenants': json.loads(raw)}
              print("No tenants.yml; using DEPLOY_TENANTS var.")

          tenant = os.environ['TENANT']
          tier = os.environ['TIER']
          pr_number = os.environ['PR_NUMBER']
          tc = config['tenants'][tenant]

          # Preview prefers a dedicated 'preview' env block; falls back to 'dev'.
          if tier == 'preview':
              env_tier = 'preview' if 'preview' in tc['environments'] else 'dev'
          else:
              env_tier = tier
          env_cfg = tc['environments'][env_tier]

          is_preview = tier == 'preview'
          stage = f"pr{pr_number}" if is_preview else env_cfg['stage']
          aws_account = 'prod' if tier == 'production' else 'dev'

          # Deployment-record environment name
          label = tc.get('preview_label')
          if is_preview:
              deploy_env = f"{tenant}-pr{pr_number}" if label else f"pr{pr_number}"
          else:
              deploy_env = env_cfg['github_environment']

          # Server domain: pr<N>.<preview_server_domain> for previews
          if is_preview:
              server_domain = f"pr{pr_number}.{env_cfg.get('preview_server_domain', env_cfg['server_domain'])}"
          else:
              server_domain = env_cfg['server_domain']

          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write(f"app_name={tc['app_name']}\n")
              f.write(f"stage={stage}\n")
              f.write(f"aws_account={aws_account}\n")
              f.write(f"server_domain={server_domain}\n")
              f.write(f"hosted_zone={env_cfg['hosted_zone']}\n")
              f.write(f"vpc_id={env_cfg['vpc_id']}\n")
              f.write(f"app_cert_arn={env_cfg.get('app_cert_arn', '')}\n")
              f.write(f"cache_policy_id={env_cfg.get('cache_policy_id', '')}\n")
              f.write(f"cloudfront_distribution_id={env_cfg.get('cloudfront_distribution_id', '')}\n")
              f.write(f"function_vpc={env_cfg.get('function_vpc', 'false')}\n")
              f.write(f"use_documentdb_compatibility={env_cfg.get('use_documentdb_compatibility', 'false')}\n")
              f.write(f"deploy_environment={deploy_env}\n")
              f.write(f"is_preview={'true' if is_preview else 'false'}\n")

          print(f"Tenant: {tenant} | Tier: {tier} | Stage: {stage} | Account: {aws_account}")
          print(f"App: {tc['app_name']} | Domain: {server_domain} | Deploy record: {deploy_env}")
          PYEOF

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup NPM auth
        run: |
          grep -q //registry.npmjs.org ~/.npmrc || echo '//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}' >>~/.npmrc
          pnpm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}-${{ steps.cfg.outputs.aws_account }}

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # --no-frozen-lockfile: the "Wire <pkg> into workspace deps" steps above patch
      # apps/client/package.json at runtime (the removed overlays — overwatch, libreoncology,
      # pi — are not in the committed lockfile), so the lockfile and package.json are
      # intentionally out of sync when this runs.
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --recursive

      - name: Generate premium overlay glue
        # Explicit codegen — do NOT rely solely on apps/client's postinstall, which a
        # fully-cached node_modules restore can skip. `sst deploy` bundles the gitignored
        # server/premium-generated/* Lambda stubs that the premium crons/queue handler
        # reference by path, so they must exist before deploy. Empty-form (no premium) is
        # a no-op. (Mirrors the fork-build job's explicit codegen step in deploy.yml.)
        run: pnpm --filter @bike4mind/client run codegen

      - name: Download core build artifacts
        id: download-core
        if: inputs.core_content_hash != ''
        uses: actions/download-artifact@v7
        with:
          name: core-build-${{ inputs.core_content_hash }}
          path: b4m-core
        continue-on-error: true

      - name: Verify core packages restored
        id: verify-core
        if: steps.download-core.outcome == 'success'
        run: |
          echo "Checking restored core build artifacts..."
          MISSING=0
          FOUND=0
          for pkg_dir in b4m-core/*/; do
            pkg_name=$(basename "$pkg_dir")
            if [ -f "$pkg_dir/package.json" ] && grep -q '"build"' "$pkg_dir/package.json"; then
              if [ -d "$pkg_dir/dist" ]; then
                file_count=$(find "$pkg_dir/dist" -type f | wc -l)
                echo "✓ $pkg_name/dist exists ($file_count files)"
                FOUND=$((FOUND + 1))
              else
                echo "✗ $pkg_name/dist missing"
                MISSING=1
              fi
            fi
          done
          if [ "$MISSING" -eq 1 ] || [ "$FOUND" -eq 0 ]; then
            echo "rebuild_needed=true" >> $GITHUB_OUTPUT
          else
            echo "rebuild_needed=false" >> $GITHUB_OUTPUT
            echo "Core build artifacts restored successfully ($FOUND packages) - skipping rebuild"
          fi

      - name: Build bike4mind core packages
        if: steps.download-core.outcome != 'success' || steps.verify-core.outputs.rebuild_needed == 'true'
        run: |
          echo "Building core packages..."
          pnpm core:build

      # Overlay engine packages (e.g. @bike4mind/optihashi-engine) are hydrated per the
      # pin but are NOT part of the b4m-core artifact — that artifact is built in the
      # core-build job from the committed tree, which no longer contains the overlay
      # (M-final removed the committed snapshot). The conditional core:build above is
      # skipped on a successful b4m-core restore, so the engines would never be built
      # and `next build` fails to resolve them. Build them explicitly after hydration.
      # No-op in the open-core fork (no overlay -> filters match nothing).
      - name: Build premium overlay engines
        if: inputs.is_trusted_context == 'true' && steps.premium-token.outcome == 'success'
        run: |
          echo "Building hydrated premium overlay engines..."
          pnpm --filter "./packages/premium/*/engine" --filter "./packages/premium/*/engine-container" build

      - name: Verify PR is still open
        if: steps.cfg.outputs.is_preview == 'true' && inputs.pr_number != ''
        uses: Bike4Mind/workflow-templates/.github/actions/verify-pr-open@main
        with:
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ github.token }}

      - name: Bundle help content
        run: pnpm --filter @bike4mind/scripts help:bundle-content

      - name: Detect monitoring changes
        id: detect-monitoring
        if: github.event_name == 'pull_request'
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)
          if echo "$CHANGED" | grep -qE 'infra/(alarms|dashboard)\.ts|packages/premium/[^/]+/src/infra\.ts'; then
            echo "ENABLE_MONITORING=true" >> $GITHUB_ENV
            echo "Monitoring files changed - enabling monitoring for this PR stage"
          fi

      # Self-provision a fresh E2E_CLEANUP_SECRET into this preview stage's SST secrets.
      # SST is the single source of truth on every stage — no GitHub Actions secret is
      # involved (issue #251). The value is generated here and never leaves this stage's
      # SST store: the deployed Lambda (API validator) and the Playwright client both read
      # `Resource.E2E_CLEANUP_SECRET.value` via `sst shell`, so they always agree.
      #
      # Ordering is load-bearing: SST bakes secrets at deploy time, so this MUST run before
      # the `Deploy to AWS` step below. `set +x` keeps the generated value out of CI logs;
      # `set -euo pipefail` fails the step loudly if `openssl` ever errors rather than letting
      # an empty VALUE through — an empty secret is the fail-closed 401 case we must avoid.
      - name: Set E2E secret for preview stage
        if: steps.cfg.outputs.is_preview == 'true'
        run: |
          set -euo pipefail
          set +x
          VALUE=$(openssl rand -hex 32)
          pnpm sst secret set E2E_CLEANUP_SECRET "$VALUE" --stage ${{ steps.cfg.outputs.stage }}

      # Build & push the quest-processor container to the target account's ECR, then hand the
      # URI to `sst deploy` via QUEST_PROCESSOR_IMAGE. A plain `docker build` (in-daemon
      # buildkit) is used deliberately — NOT SST's docker-build provider, which boots a
      # separate buildx_buildkit builder container that times out on the self-hosted runner
      # (`booting builder: … context deadline exceeded`). This keeps `sst deploy` build-free.
      # Runs after AWS creds are configured so it targets this environment's account; the
      # deploy role needs ecr:GetAuthorizationToken, Describe/CreateRepository, layer push,
      # and ecr:PutLifecyclePolicy.
      #
      # Idempotent + cached: the image is tagged by a content hash of its build inputs and the
      # build is skipped when that tag already exists. Most pushes (infra/docs-only, CI retries,
      # rebases that don't touch the hashed paths) skip the build entirely; the ones that do
      # build warm their layers from the moving :cache tag instead of running cold.
      - name: Build & push quest-processor image
        env:
          REPO_NAME: ${{ steps.cfg.outputs.app_name }}-quest-processor
        run: |
          set -euo pipefail
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          # Content hash of the build inputs. `git rev-parse HEAD:<path>` yields git's
          # content-addressed tree/blob SHA, so identical content produces an identical tag
          # regardless of commit history. The Dockerfile + .dockerignore live under apps/client,
          # so they're covered. This path set is a deliberate SUPERSET of the true import
          # closure of `server/quest/server.ts`: under-scoping would silently ship a stale image
          # ("my fix didn't deploy"); over-scoping only triggers an unnecessary build, which the
          # layer cache makes cheap. Narrow later (import-graph in hand) only if worth it.
          # The root install inputs the Dockerfile copies (pnpm-workspace.yaml, package.json,
          # .npmrc) are listed explicitly: a change to any of them that does NOT also move
          # pnpm-lock.yaml (e.g. an .npmrc node-linker/registry edit) would otherwise hash
          # identically and reuse a stale image. Keep this set in lockstep with the install
          # layer's `COPY` in apps/client/Dockerfile.quest-service.
          IMAGE_HASH=$(for p in apps/client b4m-core packages pnpm-lock.yaml pnpm-workspace.yaml package.json .npmrc; do \
            git rev-parse "HEAD:${p}"; done | sha256sum | cut -c1-16)
          IMAGE_URI="${REGISTRY}/${REPO_NAME}:${IMAGE_HASH}"
          CACHE_TAG="${REGISTRY}/${REPO_NAME}:cache"

          # Ensure the ECR repo exists (idempotent — created on first deploy to a fresh account).
          aws ecr describe-repositories --repository-names "${REPO_NAME}" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "${REPO_NAME}" \
                 --image-scanning-configuration scanOnPush=true >/dev/null

          # Bound the tag list: expire untagged layers after 7 days and cap retained tagged
          # images at 20. Re-applied every run (idempotent). Content-hash tags collapse
          # duplicates, so the remaining tail is mostly cross-stage / cross-PR churn.
          # Non-fatal: if the deploy role lacks ecr:PutLifecyclePolicy, warn and continue
          # rather than failing the deploy over a housekeeping nicety.
          aws ecr put-lifecycle-policy --repository-name "${REPO_NAME}" \
            --lifecycle-policy-text '{"rules":[
              {"rulePriority":1,"description":"Expire untagged images after 7 days","selection":{"tagStatus":"untagged","countType":"sinceImagePushed","countUnit":"days","countNumber":7},"action":{"type":"expire"}},
              {"rulePriority":2,"description":"Keep only the last 20 tagged images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":20},"action":{"type":"expire"}}
            ]}' >/dev/null \
            || echo "::warning::Could not set ECR lifecycle policy on ${REPO_NAME} (deploy role may lack ecr:PutLifecyclePolicy) — continuing."

          # Skip the build if this exact content was already built (CI retry, rebase with no
          # relevant change, infra/docs-only push, or an identical change in another PR/stage
          # in this account). A stable tag also keeps SST from cycling the Fargate task on a
          # no-op deploy, since the image URI it sees is unchanged.
          if aws ecr describe-images --repository-name "${REPO_NAME}" \
               --image-ids imageTag="${IMAGE_HASH}" >/dev/null 2>&1; then
            echo "Image ${IMAGE_HASH} already in ECR — skipping build."
          else
            aws ecr get-login-password --region "${AWS_REGION}" \
              | docker login --username AWS --password-stdin "${REGISTRY}"

            # Plain docker build (default in-daemon builder, no buildx builder container).
            # Inline registry cache: --cache-from the moving :cache tag + BUILDKIT_INLINE_CACHE=1
            # primes layers from the registry without a builder container (the right fit here,
            # since buildx times out on the self-hosted runner). A missing :cache tag (first build
            # in an account) is tolerated — BuildKit warns and proceeds cold. Fargate runs
            # linux/amd64; the runner is amd64 so this is a native build.
            DOCKER_BUILDKIT=1 docker build \
              -f apps/client/Dockerfile.quest-service \
              --cache-from "${CACHE_TAG}" \
              --build-arg BUILDKIT_INLINE_CACHE=1 \
              -t "${IMAGE_URI}" \
              -t "${CACHE_TAG}" \
              .
            docker push "${IMAGE_URI}"
            # Refresh the moving :cache tag so the next build (any stage in this account) warms from it.
            docker push "${CACHE_TAG}"
          fi

          # Consumed by infra/questProcessorService.ts (image: questProcessorImage).
          echo "QUEST_PROCESSOR_IMAGE=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to AWS
        id: deploy
        # Step-level cap so a hung `sst deploy` (stuck CloudFormation op / state
        # lock) fails THIS step instead of burning the whole 30-min job budget.
        # A step timeout (unlike the job-level one) lets the `if: failure()`
        # "Cleanup on deployment failure" step below still run `sst unlock`, so a
        # hang doesn't orphan the lock. Healthy deploys finish well under this.
        # 30 (was 20): two drift-heavy staging heals timed out at 20 on 2026-07-05
        # (backlog reconciliation after an outage window runs long past a healthy
        # ~19m deploy). Keep this BELOW the job cap so cleanup/unlock still runs.
        timeout-minutes: 30
        env:
          CI: 'true'
          NEXT_TELEMETRY_DISABLED: '1'
          # Memory tuning: 12GB heap for TypeScript type-checking during Next.js build
          NODE_OPTIONS: --max-old-space-size=12288
          SEED_APP_NAME: ${{ steps.cfg.outputs.app_name }}
          SEED_STAGE_NAME: ${{ steps.cfg.outputs.stage }}
          SERVER_DOMAIN: ${{ steps.cfg.outputs.server_domain }}
          HOSTED_ZONE: ${{ steps.cfg.outputs.hosted_zone }}
          APP_CERT_ARN: ${{ steps.cfg.outputs.app_cert_arn }}
          VPC_ID: ${{ steps.cfg.outputs.vpc_id }}
          FUNCTION_VPC: ${{ steps.cfg.outputs.function_vpc }}
          PROD_CACHE_POLICY_ID: ${{ steps.cfg.outputs.cache_policy_id }}
          STAGING_CACHE_POLICY_ID: ${{ steps.cfg.outputs.cache_policy_id }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ steps.cfg.outputs.cloudfront_distribution_id }}
          USE_DOCUMENTDB_COMPATIBILITY: ${{ steps.cfg.outputs.use_documentdb_compatibility }}
          IS_PREVIEW: ${{ steps.cfg.outputs.is_preview }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          BUILD_TAG: ${{ github.ref_name }}/${{ github.sha }}
          # Account-tied GA4 property; provided only when the deploying org sets the
          # repo/org variable. Empty == analytics disabled (no brand fallback). infra/web.ts
          # additionally gates this to the production stage.
          GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
          # Account-tied brand logo URL for transactional emails (no brand fallback).
          LOGO_URL: ${{ vars.LOGO_URL }}
          # Account-tied brand identity (issue #9310); no brand fallback. Empty == the app
          # ships no product name / marketing URL and inbound-email ingestion accepts nothing.
          # NEXT_PUBLIC_APP_NAME/WEBSITE_URL are build-time-inlined, so they must be set BEFORE
          # the first deploy. Set as repo/org variables per GitHub Environment.
          APP_NAME: ${{ vars.APP_NAME }}
          WEBSITE_URL: ${{ vars.WEBSITE_URL }}
          PLATFORM_EMAIL_DOMAIN: ${{ vars.PLATFORM_EMAIL_DOMAIN }}
          # Operator blog host for the optional blog-integration feature (open-core #9392).
          # Build-time-inlined as NEXT_PUBLIC_BLOG_HOST (set BEFORE the first deploy) and read by
          # the proxy CSP. Account-tied, no brand fallback; empty == feature ships without a host.
          BLOG_HOST: ${{ vars.BLOG_HOST }}
          # Share-footer theming (open-core #9392), build-time-inlined. SHARE_BUILTIN_LOGO=true opts
          # into the project's own wordmark on share pages; forks leave it unset for a text wordmark.
          # SHARE_BRAND_* are optional palette overrides (default to the in-source palette).
          SHARE_BUILTIN_LOGO: ${{ vars.SHARE_BUILTIN_LOGO }}
          SHARE_BRAND_NAVY: ${{ vars.SHARE_BRAND_NAVY }}
          SHARE_BRAND_LIME: ${{ vars.SHARE_BRAND_LIME }}
          SHARE_BRAND_ORANGE: ${{ vars.SHARE_BRAND_ORANGE }}
          # Production domain (account-tied, no brand fallback) — non-prod jobs that pull config
          # FROM production (dataSyncerHandler) need the prod host on every stage.
          PROD_SERVER_DOMAIN: ${{ vars.PROD_SERVER_DOMAIN }}
          # Account-tied Stripe price ids (build-time NEXT_PUBLIC_*, inlined by next build).
          # Per-stage pairs, no brand fallback; empty == that checkout is inactive. Set as
          # repo/org variables. See apps/client/lib/subscriptions & entitlements/registry.
          NEXT_PUBLIC_STRIPE_PRICE_ORG_SUB_TEST: ${{ vars.NEXT_PUBLIC_STRIPE_PRICE_ORG_SUB_TEST }}
          NEXT_PUBLIC_STRIPE_PRICE_ORG_SUB_PROD: ${{ vars.NEXT_PUBLIC_STRIPE_PRICE_ORG_SUB_PROD }}
          NEXT_PUBLIC_STRIPE_PRICE_PRO_TEST: ${{ vars.NEXT_PUBLIC_STRIPE_PRICE_PRO_TEST }}
          NEXT_PUBLIC_STRIPE_PRICE_PRO_PROD: ${{ vars.NEXT_PUBLIC_STRIPE_PRICE_PRO_PROD }}
          NEXT_PUBLIC_STRIPE_PRICE_LIBONC_TEST: ${{ vars.NEXT_PUBLIC_STRIPE_PRICE_LIBONC_TEST }}
          NEXT_PUBLIC_STRIPE_PRICE_LIBONC_PROD: ${{ vars.NEXT_PUBLIC_STRIPE_PRICE_LIBONC_PROD }}
          # Account-tied internal staff domains (comma-separated) for the domain-grant path
          # (entitlements/registry.ts). Build-time NEXT_PUBLIC_*, no brand fallback; empty ==
          # no internal-domain grant. Set the repo/org variable per stage to activate.
          NEXT_PUBLIC_INTERNAL_STAFF_DOMAINS: ${{ vars.NEXT_PUBLIC_INTERNAL_STAFF_DOMAINS }}
          # External customer domain-grant rows as JSON (entitlements/registry.ts). Build-time
          # NEXT_PUBLIC_*, no brand fallback; empty == no external grant. Keeps customer/partner
          # identity out of open-core — set the NEXT_PUBLIC_PREMIUM_DOMAIN_GRANTS repo/org variable
          # per stage to a JSON array of { domain, entitlements }.
          NEXT_PUBLIC_PREMIUM_DOMAIN_GRANTS: ${{ vars.NEXT_PUBLIC_PREMIUM_DOMAIN_GRANTS }}
          # Premium data-lake definitions as JSON (constants/dataLakes.ts). Build-time NEXT_PUBLIC_*,
          # no fallback; empty == only the base opti-knowledge lake. Keeps customer lake identity out
          # of open-core — set NEXT_PUBLIC_PREMIUM_DATA_LAKES to a JSON array of DataLakeConfig.
          NEXT_PUBLIC_PREMIUM_DATA_LAKES: ${{ vars.NEXT_PUBLIC_PREMIUM_DATA_LAKES }}
          # Account-tied subscriber-fanout image reference (registry + tag). Set the
          # SUBSCRIBER_FANOUT_IMAGE repo/org variable to your published image; no brand
          # fallback. Bump the variable to roll forward (no in-tree Dockerfile to maintain).
          SUBSCRIBER_FANOUT_IMAGE: ${{ vars.SUBSCRIBER_FANOUT_IMAGE }}
          # Quest-processor image built & pushed to ECR in the previous step (build-free
          # sst deploy). See infra/questProcessorService.ts.
          QUEST_PROCESSOR_IMAGE: ${{ env.QUEST_PROCESSOR_IMAGE }}
          ENABLE_WHATS_NEW_DISTRIBUTION: ${{ github.repository == (vars.CANONICAL_REPO || 'MillionOnMars/lumina5') && github.ref == 'refs/heads/prod' && 'true' || 'false' }}
          # Extra SSRF-allowlisted host suffix(es) for the What's New distribution URL (open-core
          # #9392). Account-tied, no brand fallback; empty == only CloudFront/S3 + SERVER_DOMAIN
          # are accepted. A fork sets this to pull the upstream feed from a custom upstream domain.
          WHATS_NEW_ALLOWED_DISTRIBUTION_HOSTS: ${{ vars.WHATS_NEW_ALLOWED_DISTRIBUTION_HOSTS }}
          # Comma-separated external AWS account IDs granted cross-account sqs:SendMessage
          # to the overwatch analytics queue (no brand fallback; empty == no policy created).
          OVERWATCH_ANALYTICS_CROSS_ACCOUNT_IDS: ${{ vars.OVERWATCH_ANALYTICS_CROSS_ACCOUNT_IDS }}
          # Staging MongoDB URI for syncing adminsettings to preview environments
          STAGING_MONGODB_URI: ${{ secrets.STAGING_MONGODB_URI }}
          # Auto-detected: set to 'true' when PR touches infra/alarms.ts or infra/dashboard.ts
          ENABLE_MONITORING: ${{ env.ENABLE_MONITORING || '' }}
          ENABLE_WAF: ${{ vars.ENABLE_WAF || 'false' }}
        run: |
          pnpm sst deploy --stage ${{ steps.cfg.outputs.stage }}

      - name: Sync and seed additional data
        if: steps.cfg.outputs.stage != 'production' && (vars.SYNC_RAPID_REPLY_MAPPINGS == 'true' || steps.cfg.outputs.is_preview == 'true')
        # Step-level cap so a hung `sst shell` data-syncer can't eat the rest of
        # the job budget; the failure() cleanup below still runs `sst unlock`.
        timeout-minutes: 10
        env:
          CI: 'true'
          SEED_APP_NAME: ${{ steps.cfg.outputs.app_name }}
          SEED_STAGE_NAME: ${{ steps.cfg.outputs.stage }}
          AWS_REGION: ${{ env.AWS_REGION }}
          SYNC_RAPID_REPLY_MAPPINGS: 'true'
          # Attempt the seed on every preview deploy. The DataSyncer writes a
          # `staging-config-sync` marker into the preview DB after the first
          # successful sync and short-circuits on subsequent runs, so this is a
          # no-op once seeded. Do NOT gate on github.event.action (opened/etc.):
          # the common feature->feature PR retargeted to main first deploys via
          # `synchronize` (or the retarget fires `edited`, not in our types), so
          # an action gate would skip the one-time seed entirely for those PRs.
          SYNC_PREVIEW_SETTINGS: ${{ steps.cfg.outputs.is_preview == 'true' && github.event_name == 'pull_request' }}
        run: |
          echo "Syncing and seeding additional data..."
          pnpm sst shell --stage ${{ steps.cfg.outputs.stage }} --print-logs -- node scripts/invoke-data-syncer.mjs

      - name: Cleanup on deployment failure
        if: steps.cfg.outcome == 'success' && (failure() || cancelled())
        env:
          CI: 'true'
          SEED_APP_NAME: ${{ steps.cfg.outputs.app_name }}
          SEED_STAGE_NAME: ${{ steps.cfg.outputs.stage }}
          SERVER_DOMAIN: ${{ steps.cfg.outputs.server_domain }}
          HOSTED_ZONE: ${{ steps.cfg.outputs.hosted_zone }}
          APP_CERT_ARN: ${{ steps.cfg.outputs.app_cert_arn }}
          VPC_ID: ${{ steps.cfg.outputs.vpc_id }}
          FUNCTION_VPC: ${{ steps.cfg.outputs.function_vpc }}
          PROD_CACHE_POLICY_ID: ${{ steps.cfg.outputs.cache_policy_id }}
          STAGING_CACHE_POLICY_ID: ${{ steps.cfg.outputs.cache_policy_id }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ steps.cfg.outputs.cloudfront_distribution_id }}
          USE_DOCUMENTDB_COMPATIBILITY: ${{ steps.cfg.outputs.use_documentdb_compatibility }}
          IS_PREVIEW: ${{ steps.cfg.outputs.is_preview }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          ENABLE_WHATS_NEW_DISTRIBUTION: ${{ github.repository == (vars.CANONICAL_REPO || 'MillionOnMars/lumina5') && github.ref == 'refs/heads/prod' && 'true' || 'false' }}
        run: |
          echo "Deployment failed for stage: ${{ steps.cfg.outputs.stage }}"
          echo "Attempting to unlock deployment state..."
          # Fast-path unlock on ordinary failures — race-free because the deploy
          # concurrency group serializes runs. The dedicated `unlock` job in
          # deploy.yml is the backstop for runner death / hard cancellation.
          pnpm sst unlock --stage ${{ steps.cfg.outputs.stage }}
          echo "Cleanup completed. Next deployment should proceed normally."
          echo "Original deployment failure will still be reported."

      - name: Comment PR with deployment info
        if: steps.cfg.outputs.is_preview == 'true' && inputs.pr_number != ''
        uses: actions/github-script@v8
        env:
          SERVER_DOMAIN: ${{ steps.cfg.outputs.server_domain }}
          STAGE: ${{ steps.cfg.outputs.stage }}
          AWS_ACCOUNT: ${{ steps.cfg.outputs.aws_account }}
        with:
          script: |
            const deploymentUrl = `https://app.${process.env.SERVER_DOMAIN}`;

            const comment = `🚀 **Preview Deployment Ready!**

            **App:** ${deploymentUrl}
            **Environment:** \`${process.env.STAGE}\`
            **AWS Account:** \`${process.env.AWS_ACCOUNT}\`

            This preview will be automatically cleaned up when the PR is closed.`;

            await github.rest.issues.createComment({
              issue_number: ${{ inputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Create deployment record
        if: success()
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          DEPLOY_ENV: ${{ steps.cfg.outputs.deploy_environment }}
          SERVER_DOMAIN: ${{ steps.cfg.outputs.server_domain }}
          IS_PREVIEW: ${{ steps.cfg.outputs.is_preview }}
        with:
          script: |
            const env = process.env.DEPLOY_ENV;
            const url = `https://app.${process.env.SERVER_DOMAIN}`;
            const isPreview = process.env.IS_PREVIEW === 'true';
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: env,
              auto_merge: false,
              required_contexts: [],
              transient_environment: isPreview,
              production_environment: env === 'production'
            });
            if (deployment.data?.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'success',
                environment_url: url
              });
              console.log(`Deployment record created for ${env} -> ${url}`);
            }

      - name: Output deployment info
        run: |
          echo "Deployment completed for stage: ${{ steps.cfg.outputs.stage }}"
          echo "Server Domain: ${{ steps.cfg.outputs.server_domain }}"
          echo "AWS Account: ${{ steps.cfg.outputs.aws_account }}"
          echo "Is Preview: ${{ steps.cfg.outputs.is_preview }}"
          echo "Deployment URL: https://app.${{ steps.cfg.outputs.server_domain }}"
