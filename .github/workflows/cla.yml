name: CLA

# Contributor License Agreement gate. Every first-time contributor must sign the
# CLA (root CLA.md) before their PR can merge — this is what lets each release
# convert to Apache-2.0 on its Change Date (Bike4Mind must hold relicense rights
# in every contribution). Standard individual + corporate CLA via CLA-Assistant.
#
# GUARDED to the public open-core repo: inert in the private monorepo (and in
# forks), activates only where external contributors actually open PRs. Mirrors
# the canonical-repo guard used by the other workflows.
#
# Signature storage auth: a short-lived installation token minted from the
# org-owned release app (bike4mind-release-bot, installed org-wide with
# contents:write) — same pattern as auto-changeset.yml / release.yaml. No
# human-owned PAT to manage or expire. GITHUB_TOKEN alone cannot push to the
# `cla-signatures` branch, which is created automatically on first signature.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    # Only run in the canonical public repo; never in the private monorepo or forks.
    if: >
      github.repository == (vars.OPEN_CORE_REPO || 'Bike4Mind/bike4mind') &&
      (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
        github.event_name == 'pull_request_target'
      )
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # App installation token with contents:write, used to persist
          # signatures on the cla-signatures branch (org app, not a PAT).
          PERSONAL_ACCESS_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          # Built from the repo it actually runs in, so a rename or an
          # OPEN_CORE_REPO override never points contributors at the wrong CLA.
          path-to-document: '${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/CLA.md'
          branch: 'cla-signatures'
          # Bots never sign.
          allowlist: dependabot[bot],github-actions[bot],renovate[bot],*[bot]
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: >
            Thanks for your pull request — before it can merge, please read our
            [Contributor License Agreement](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/CLA.md)
            and sign it by posting the comment below. You keep copyright to your
            work; this is what lets each release convert to Apache-2.0 on schedule.
          custom-allsigned-prcomment: >
            All contributors have signed the CLA. ✅
