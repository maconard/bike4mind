name: Secrets Security (Scan)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this secrets scan is being run'
        required: true
        default: 'manual'
        type: string
      stage:
        description: 'Logical stage name (e.g. dev, pr6015, staging)'
        required: false
        type: string

env:
  DEFAULT_SECRETS_STAGE: dev

jobs:
  secrets-scan:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    timeout-minutes: 30
    env:
      # Optional override passed from workflow_dispatch
      SECRETS_STAGE: ${{ github.event.inputs.stage }}
      # Where to send summarized results (secrets / key protection analysis).
      # If a PR stage is provided (e.g. "pr6015"), send to that PR's preview host.
      # Otherwise (dev/staging/main), fall back to the shared ingest URL secret.
      LUMINA5_INGEST_URL: ${{ github.event.inputs.stage && startsWith(github.event.inputs.stage, 'pr') && format('https://app.{0}.{1}/api/admin/security-dashboard/secrets-ingest', github.event.inputs.stage, vars.PREVIEW_SERVER_DOMAIN) || secrets.SECOPS_SECRETS_INGEST_URL }}
      LUMINA5_INGEST_TOKEN: ${{ secrets.SECOPS_SECRETS_INGEST_TOKEN }}
      # Location of the secrets scan JSON report
      SECRETS_JSON_REPORT_PATH: ${{ github.workspace }}/secrets-scan-report.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: 8.24.3
        run: |
          echo "Installing gitleaks ${GITLEAKS_VERSION}..."
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run secrets scan with gitleaks
        # GITLEAKS_LICENSE is available as an org secret; the CLI does not
        # currently require it, but we pass it through for future compatibility.
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: |
          echo "Running gitleaks scan..."
          gitleaks detect \
            --source=. \
            --report-format=json \
            --report-path="${SECRETS_JSON_REPORT_PATH}" \
            --no-banner \
            --exit-code=0

      - name: Summarize secrets scan and send to Security Dashboard
        run: node scripts/secrets-scan-summarize-and-ingest.mjs

      - name: Cleanup raw secrets report
        if: always()
        run: rm -f "${SECRETS_JSON_REPORT_PATH}"

