# Cleanup Packages by Tag
#
# This workflow removes prerelease packages from NPM that were published with a specific tag.
# It's designed to clean up packages created by publish-packages.yaml when feature branches
# are merged or deleted, preventing NPM registry pollution.
#
# Usage:
# 1. Navigate to GitHub Actions → "Cleanup Packages by Tag"
# 2. Click "Run workflow"
# 3. Enter the tag name (e.g., "pr-123", "feature-branch")
# 4. Run with dry_run=true first to preview what will be deleted
# 5. Run with dry_run=false to actually perform the cleanup
#
# Safety Features:
# - Dry run mode is enabled by default
# - Only removes prerelease versions, not official releases
# - Provides detailed logging of actions taken

name: Cleanup Packages by Tag

on:
  # pull_request:
  #   types: [closed]
  #   paths:
  #     - 'b4m-core/**'

  # Manual trigger only - requires user input for safety
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to delete (e.g., feature-branch, pr-123)'
        required: true
        type: string
      dry_run:
        description: 'Dry run - show what would be deleted without actually deleting'
        required: false
        type: boolean
        default: true

# Minimal permissions - only need to read repository contents
permissions:
  contents: read

jobs:
  check-repository:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Check repository
        id: check
        run: |
          if [ "${{ github.repository }}" = "${{ vars.CANONICAL_REPO || 'MillionOnMars/lumina5' }}" ]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "Skipping workflow - not running on the canonical repository"
          fi

  cleanup-packages:
    needs: check-repository
    if: ${{ needs.check-repository.outputs.should-run == 'true' && !startsWith(github.head_ref, 'release') }}
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    steps:
      # Step 1: Get the source code to access package.json files
      - name: Checkout repository
        uses: actions/checkout@v6

      # Step 2: Install pnpm package manager (same version as other workflows)
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false # Don't auto-install dependencies yet

      # Step 3: Setup Node.js with caching for faster builds
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm' # Cache pnpm dependencies
          cache-dependency-path: '**/pnpm-lock.yaml'

      # Step 4: Configure NPM authentication for package operations
      # Creates .npmrc file with auth token for NPM registry access
      - name: Authenticate with NPM
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN_PUBLISH }}" > ~/.npmrc

      # Step 5: Install dependencies (needed to read package.json files)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter "./b4m-core/*"

      # Step 6: Clean up packages with the specified tag
      - name: Cleanup packages
        env:
          TAG: ${{ github.event.inputs.tag || github.head_ref }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_PUBLISH }}
        run: |
          echo "===== Package Cleanup Started ====="
          echo "Target tag: $TAG"
          echo "Dry run mode: $DRY_RUN"
          echo ""

          # Sanitize the tag using the same logic as publish-packages.yaml
          # This ensures we match the exact tag format used during publishing
          SANITIZED_TAG=$(echo "$TAG" | sed 's/[^a-zA-Z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g')
          echo "Sanitized tag: $SANITIZED_TAG"
          echo ""

          # Define all packages in the monorepo that may have been published
          PACKAGES=(
            "b4m-core/agents"
            "b4m-core/auth"
            "b4m-core/common"
            "b4m-core/core"
            "b4m-core/db-core"
            "b4m-core/fab-pipeline"
            "b4m-core/infra"
            "b4m-core/llm-adapters"
            "b4m-core/observability"
            "b4m-core/services"
            "b4m-core/utils"
            "b4m-core/mcp"
            "b4m-core/slack"
            "packages/premium/optihashi/engine"
            "packages/cli"
          )

          # Process each package individually
          for PACKAGE_DIR in "${PACKAGES[@]}"; do
            if [ ! -d "$PACKAGE_DIR" ]; then
              echo "⚠️  Package directory $PACKAGE_DIR not found, skipping"
              continue
            fi

            # Navigate to package directory and get package name from package.json
            cd "$PACKAGE_DIR"
            PACKAGE_NAME=$(node -p "require('./package.json').name")
            echo "🔍 Checking package: $PACKAGE_NAME"

            # Check if a version exists with this tag in NPM registry
            # The 2>/dev/null suppresses error output if tag doesn't exist
            TAG_VERSION=$(npm view $PACKAGE_NAME dist-tags.$SANITIZED_TAG 2>/dev/null || echo "")

            if [ -n "$TAG_VERSION" ]; then
              echo "   ✅ Found version $TAG_VERSION with tag $SANITIZED_TAG"

              if [ "$DRY_RUN" = "true" ]; then
                # Dry run mode - show what would be deleted without actually doing it
                echo "   🔥 [DRY RUN] Would delete: $PACKAGE_NAME@$TAG_VERSION (tag: $SANITIZED_TAG)"
              else
                # Actual cleanup mode - perform the deletion
                echo "   🗑️  Deleting: $PACKAGE_NAME@$TAG_VERSION (tag: $SANITIZED_TAG)"

                # Step 1: Remove the dist-tag (e.g., "feature-branch" -> removes the tag)
                # This prevents the tag from pointing to this version
                npm dist-tag rm $PACKAGE_NAME $SANITIZED_TAG || echo "   ⚠️  Failed to remove dist-tag, continuing..."

                # Step 2: Unpublish the specific version entirely
                # This removes the version from NPM registry completely
                npm unpublish $PACKAGE_NAME@$TAG_VERSION || echo "   ⚠️  Failed to unpublish version, it may not exist or may be protected"

                echo "   ✅ Cleanup completed for $PACKAGE_NAME"
              fi
            else
              echo "   ❌ No version found with tag $SANITIZED_TAG for $PACKAGE_NAME"
            fi

            # Return to root directory for next iteration
            cd - > /dev/null
            echo ""
          done

          # Final summary
          echo "===== Package Cleanup Summary ====="
          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 Dry run completed. Review the output above to see what would be deleted."
            echo "💡 To actually perform the cleanup, re-run this workflow with dry_run=false"
          else
            echo "✅ Cleanup completed for tag: $TAG"
            echo "🧹 All associated prerelease packages have been removed from NPM registry"
          fi
