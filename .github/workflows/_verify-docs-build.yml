name: Verify Docs Build (Reusable)

on:
  workflow_call:
    outputs:
      has_changes:
        description: 'Whether docs-site changes were detected'
        value: ${{ jobs.verify-docs-build.outputs.has_changes }}

env:
  NODE_VERSION: '24'

jobs:
  verify-docs-build:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    # Always run on PRs to check for docs changes (required before deploy)
    if: |
      github.repository == (vars.CANONICAL_REPO || 'MillionOnMars/lumina5') &&
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]'
    outputs:
      has_changes: ${{ steps.docs-changes.outputs.has_changes }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2  # Only fetch last 2 commits for quick diff

      - name: Check for docs changes
        id: docs-changes
        run: |
          # Check if any files in docs-site/ were changed
          # For PRs, fetch base branch efficiently
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --depth=1 origin ${{ github.base_ref }}
          fi
          
          DOCS_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null | grep '^docs-site/' || echo "")
          if [ -n "$DOCS_CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            TOTAL=$(echo "$DOCS_CHANGED" | wc -l | tr -d ' ')
            DISPLAY=$(echo "$DOCS_CHANGED" | head -5)
            if [ "$TOTAL" -gt 5 ]; then
              DISPLAY=$(printf '%s\n...and %d more' "$DISPLAY" "$((TOTAL - 5))")
            fi
            {
              echo "changed_files<<EOF"
              echo "$DISPLAY"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            echo "Docs changes detected:"
            echo "$DOCS_CHANGED"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No docs-site changes detected - skipping build verification"
            echo "✅ This job will report success (skip is OK for deploy to proceed)"
          fi

      - name: Skip message
        if: steps.docs-changes.outputs.has_changes == 'false'
        run: |
          echo "::notice::No docs-site changes in this PR - build verification skipped"
          echo "Deploy job will proceed normally since this is expected behavior"

      - name: Setup pnpm
        if: steps.docs-changes.outputs.has_changes == 'true'
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        if: steps.docs-changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'docs-site/pnpm-lock.yaml'

      - name: Cache docs dependencies
        if: steps.docs-changes.outputs.has_changes == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            docs-site/node_modules
          key: ${{ runner.os }}-docs-deps-${{ hashFiles('docs-site/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-docs-deps-

      - name: Install dependencies
        if: steps.docs-changes.outputs.has_changes == 'true'
        working-directory: docs-site
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Build Docusaurus site
        if: steps.docs-changes.outputs.has_changes == 'true'
        working-directory: docs-site
        env:
          DOCS_URL: 'https://docs.preview.bike4mind.com'
          NODE_ENV: 'production'
        run: pnpm build

      - name: Verify build output
        if: steps.docs-changes.outputs.has_changes == 'true'
        working-directory: docs-site
        run: |
          if [ ! -d "build" ]; then
            echo "❌ Build directory not found!"
            exit 1
          fi
          
          if [ ! -f "build/index.html" ]; then
            echo "❌ index.html not found in build output!"
            exit 1
          fi
          
          echo "✅ Build output verified"
          du -sh build/

      - name: Comment PR with build success
        if: success() && steps.docs-changes.outputs.has_changes == 'true'
        # Fork PRs get a read-only GITHUB_TOKEN, so createComment 403s. Non-fatal:
        # never let a cosmetic PR comment fail the required Deploy check on forks.
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const buildSize = require('child_process')
              .execSync('du -sh docs-site/build/')
              .toString()
              .split('\t')[0];
            
            const changedFiles = process.env.CHANGED_FILES || '';
            const filesList = changedFiles.split('\n').filter(Boolean).map(f => `- \`${f}\``).join('\n');

            const comment = `✅ **Docs Build Verification Passed!**

            Docusaurus build completed successfully.
            - **Build size**: ${buildSize}
            - **Preview locally**: \`cd docs-site && pnpm start\`

            **Changed files:**
            ${filesList}

            Your changes will be deployed to:
            - **Staging**: \`docs.staging.bike4mind.com\` (when merged to \`main\`)
            - **Production**: \`docs.bike4mind.com\` (when merged to \`prod\`)`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Docs Build Verification')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
        env:
          CHANGED_FILES: ${{ steps.docs-changes.outputs.changed_files }}

      - name: Comment PR with build failure
        if: failure() && steps.docs-changes.outputs.has_changes == 'true'
        # Fork PRs get a read-only GITHUB_TOKEN, so createComment 403s. Non-fatal:
        # never let a cosmetic PR comment fail the required Deploy check on forks.
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const comment = `❌ **Docs Build Verification Failed!**
            
            The Docusaurus build failed. Please check the workflow logs for details.
            
            **Common issues**:
            - Broken MDX syntax
            - Missing imported components
            - Invalid frontmatter
            - Broken internal links
            
            **To fix**:
            1. Run \`cd docs-site && pnpm install --ignore-workspace\`
            2. Run \`pnpm build\` to reproduce the error locally
            3. Fix the build errors
            4. Test with \`pnpm start\` to verify
            5. Push your fixes
            
            See the [Docs Contribution Guide](docs/DOCS_CONTRIBUTION_GUIDE.md) for more help.`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Docs Build Verification')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
