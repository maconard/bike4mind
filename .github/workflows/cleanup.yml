name: Cleanup Preview Environment

on:
  pull_request_target:
    # Mirror deploy.yml — stacked PRs (PR2 → PR1 → main) also get preview envs
    # and must be torn down on close. The preview stage name is derived from
    # the PR number, so the rest of this workflow handles arbitrary base refs.
    # Exclude prod-targeted PRs (no preview was created, nothing to clean up).
    branches-ignore: [prod]
    types: [closed]

env:
  AWS_REGION: us-east-2
  NODE_VERSION: '24'

jobs:
  cleanup-preview:
    name: Cleanup Preview
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    # Bind to the `preview` GitHub Environment so AWS_ROLE_ARN resolves to the
    # dedicated bike4mind-previews account — the same role
    # deploy.yml uses for previews, so cleanup tears down where it built.
    # b4m-infra #480. (preview env has no required-reviewer protection.)
    environment: preview
    # 45 (was 30): sst remove on a heavy stage (many EventBridge rules /
    # Lambda versions) plus cold-runner pnpm install was hitting the cap.
    # Ports the timeout bump from polaris#4085.
    timeout-minutes: 45
    concurrency:
      group: cleanup-${{ github.event.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
      issues: write
      actions: read
      packages: read
      pull-requests: write
      deployments: write
    # Only cleanup if a deployment would have happened
    # Skip for: dependabot PRs, main→prod promotion PRs, changeset release PRs
    # Note: use pull_request.user.login instead of github.actor so the check
    # still holds when a human syncs/updates a dependabot PR
    if: |
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      !(github.event.pull_request.head.ref == 'main' && github.event.pull_request.base.ref == 'prod') &&
      !startsWith(github.event.pull_request.head.ref, 'changeset-release/')

    steps:
      - name: Wait for active deploy runs to complete
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "Checking for active deploy runs on branch: $BRANCH"
          MAX_WAIT=600
          INTERVAL=20
          WAITED=0
          while [ $WAITED -lt $MAX_WAIT ]; do
            ACTIVE=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow=deploy.yml \
              --branch="$BRANCH" \
              --limit 100 \
              --json status \
              --jq '[.[] | select(.status != "completed")] | length' 2>/dev/null || echo "0")
            if [ "$ACTIVE" = "0" ]; then
              echo "No active deploy runs found. Proceeding with cleanup."
              break
            fi
            echo "Found $ACTIVE active deploy run(s). Waiting ${INTERVAL}s... (${WAITED}s elapsed)"
            sleep $INTERVAL
            WAITED=$((WAITED + INTERVAL))
          done
          if [ $WAITED -ge $MAX_WAIT ]; then
            echo "::warning::Timed out waiting for deploy runs. Proceeding anyway."
          fi

      - name: Set preview configuration
        id: config
        run: |
          echo "is_preview=true" |tee -a "$GITHUB_OUTPUT"
          echo "app_name=${{ vars.SEED_APP_NAME || 'bike4mind' }}" |tee -a "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup NPM auth
        run: |
          grep -q //registry.npmjs.org ~/.npmrc || echo '//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}' >>~/.npmrc
          pnpm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --recursive

      - name: Build bike4mind core packages
        run: pnpm core:build

      - name: Configure AWS credentials for previews account
        uses: aws-actions/configure-aws-credentials@v6
        with:
          # Resolves from the `preview` GitHub Environment → bike4mind-previews
          # account role (b4m-infra #480), matching deploy.yml so cleanup runs
          # in the account the preview stage actually lives in.
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}-preview-cleanup

      - name: Throttle all PR stage Lambdas
        id: throttle
        if: steps.config.outputs.is_preview == 'true'
        run: |
          STAGE="pr${{ github.event.number }}"

          echo "Finding Lambda functions for stage: ${STAGE} (via sst:stage tag)"
          # Rely on the AWS CLI's default auto-pagination: it follows
          # PaginationToken across every page and combines ResourceTagMappingList
          # into one output. On a stage with >100 tagged Lambdas this is what
          # guarantees we see DatabaseCleaner even if it lands on a later page.
          # (Do NOT add --no-paginate: that makes a single call for the first
          # page only — the exact silent-skip we're trying to avoid.)
          ARNS=$(aws resourcegroupstaggingapi get-resources \
            --tag-filters Key=sst:stage,Values="${STAGE}" \
            --resource-type-filters lambda:function \
            --query 'ResourceTagMappingList[].ResourceARN' \
            --output text)

          if [ -z "$ARNS" ]; then
            echo "No Lambda functions found for stage ${STAGE}"
            echo "cleanup_function=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CLEANER_FUNC=""
          for arn in $ARNS; do
            func=$(echo "$arn" | sed 's/.*:function://')
            if echo "$func" | grep -q "DatabaseCleaner"; then
              CLEANER_FUNC="$func"
              echo "Found cleanup function: $func (will not throttle)"
              continue
            fi
            echo "Throttling: $func"
            aws lambda put-function-concurrency \
              --function-name "$func" \
              --reserved-concurrent-executions 0 || true
          done

          if [ -z "$CLEANER_FUNC" ]; then
            echo "WARNING: DatabaseCleaner function not found for ${STAGE}"
            echo "This PR was deployed before the cleanup Lambda was added."
            echo "Database will need manual cleanup."
            echo "cleanup_function=" >> "$GITHUB_OUTPUT"
          else
            echo "cleanup_function=${CLEANER_FUNC}" >> "$GITHUB_OUTPUT"
          fi

          echo "Waiting 60s for in-flight executions to drain..."
          sleep 60

      - name: Cleanup preview database
        if: steps.config.outputs.is_preview == 'true' && steps.throttle.outputs.cleanup_function != ''
        run: |
          FUNC="${{ steps.throttle.outputs.cleanup_function }}"
          echo "Invoking cleanup Lambda: $FUNC"

          # --cli-read-timeout 130: the cleaner Lambda runs up to ~120s; the CLI
          # default socket read timeout (60s) would raise a false ReadTimeoutError
          # mid-run. 130 covers the Lambda's own timeout with margin.
          INVOKE_META=$(aws lambda invoke \
            --function-name "$FUNC" \
            --payload '{"action":"cleanup","stage":"pr${{ github.event.number }}","isPreview":true,"timestamp":'$(date +%s)'}' \
            --cli-binary-format raw-in-base64-out \
            --cli-read-timeout 130 \
            response.json)

          echo "Invoke metadata: $INVOKE_META"
          echo "Response payload:"
          cat response.json

          # Hard-fail (was a silent ::warning::): an unreported DB-cleanup failure
          # leaves orphaned preview data and looks identical to success.
          # FunctionError is in the stdout invoke metadata, not response.json.
          if echo "$INVOKE_META" | grep -q '"FunctionError"'; then
            echo "::error::Database cleanup Lambda raised a FunctionError"
            cat response.json
            exit 1
          fi
          # The handler returns an HTTP-style statusCode in the response payload;
          # anything other than 200 is a failed cleanup.
          STATUS=$(jq -r '.statusCode // empty' response.json 2>/dev/null || true)
          if [ -n "$STATUS" ] && [ "$STATUS" != "200" ]; then
            echo "::error::Database cleanup returned non-200 statusCode: $STATUS"
            exit 1
          fi
          echo "Database cleanup succeeded."

      - name: Remove preview environment
        uses: ./.github/actions/sst-remove-idempotent
        with:
          stage: pr${{ github.event.number }}
        env:
          STAGING_CACHE_POLICY_ID: ${{ vars.STAGING_CACHE_POLICY_ID }}

      - name: Prune SST state objects
        continue-on-error: true
        env:
          APP: ${{ steps.config.outputs.app_name }}
          PR: ${{ github.event.number }}
        run: |
          BUCKET="sst-state-ttenxhwrmwmr"
          for key in \
            "app/${APP}/pr${PR}.json" \
            "secret/${APP}/pr${PR}.json"; do
            aws s3 rm "s3://${BUCKET}/${key}" 2>/dev/null || true
          done
          for prefix in \
            "update/${APP}/pr${PR}/" \
            "eventlog/${APP}/pr${PR}/" \
            "snapshot/${APP}/pr${PR}/"; do
            aws s3 rm "s3://${BUCKET}/${prefix}" --recursive 2>/dev/null || true
          done
          echo "SST state pruned: s3://${BUCKET} stage=pr${PR} app=${APP}"

      # App identity fallback: lumina5 uses the MillionOnMars ops app
      # (GH_APP_ID / GH_APP_PRIVATE_KEY). The open-core snapshot repo has
      # neither — that app is not installed on the Bike4Mind org — so fall back
      # to the org's release app (RELEASE_APP_ID / RELEASE_APP_PRIVATE_KEY,
      # same pair auto-changeset/release/cla use). The env-delete below needs
      # the app to hold the repo Administration/Environments permission; grant
      # it on the release app or the delete no-ops (it is continue-on-error).
      # continue-on-error on the mint too: a broken app config must not fail
      # the job AFTER sst remove already succeeded — the env delete is best-
      # effort cosmetics (#8895), not teardown.
      - name: Generate app token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_APP_ID || vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY || secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Delete GitHub Environment
        if: steps.app-token.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api --method DELETE "repos/${{ github.repository }}/environments/pr${{ github.event.number }}" \
            && echo "Deleted GitHub Environment pr${{ github.event.number }}" \
            || echo "GitHub Environment pr${{ github.event.number }} not found or already deleted"

  notify-cleanup-failure:
    name: Notify Cleanup Failure
    needs: cleanup-preview
    if: always() && (needs.cleanup-preview.result == 'failure' || needs.cleanup-preview.result == 'cancelled')
    uses: ./.github/workflows/notify-cleanup-failure.yml
    with:
      pr_number: '${{ github.event.number }}'
      pr_title: '${{ github.event.pull_request.title }}'
      pr_author: '${{ github.event.pull_request.user.login }}'
      pr_url: '${{ github.event.pull_request.html_url }}'
      stage_name: 'pr${{ github.event.number }}'
      repository: '${{ github.repository }}'
      workflow_run_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
      mention: "${{ vars.SLACK_DEVOPS_USERGROUP_MENTION || '@here' }}"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
